<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sureshram@github.io: ~</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --success: #3fb950;
            --border: #30363d;
            --prompt: #79c0ff;
            --sidebar-width: 200px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 20px;
            font-size: 14px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .terminal {
            width: 1000px;
            height: 700px;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .terminal-header {
            background: var(--surface);
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .controls {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }

        .terminal-title {
            font-size: 12px;
            color: #8b949e;
        }

        .terminal-main {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-item {
            padding: 10px 20px;
            color: #8b949e;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--accent);
            background: rgba(88, 166, 255, 0.1);
        }

        .nav-item.active {
            border-left: 3px solid var(--accent);
        }

        .content-area {
            flex-grow: 1;
            padding: 30px;
            background: #0d1117;
            overflow-y: auto;
        }

        .prompt {
            color: var(--prompt);
            margin-right: 10px;
        }

        .cmd {
            color: var(--text);
            margin-bottom: 20px;
        }

        /* Markdown Styles */
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            color: var(--accent);
            margin-top: 24px;
            margin-bottom: 16px;
        }
        .markdown-body p { margin-bottom: 16px; }
        .markdown-body a { color: var(--accent); text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body ul { padding-left: 20px; margin-bottom: 16px; }
        .markdown-body li { margin-bottom: 8px; }
        .markdown-body code {
            background: var(--surface);
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 90%;
        }

        .blog-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .blog-card {
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .blog-card:hover {
            border-color: var(--accent);
        }

        .blog-card h3 {
            color: var(--accent);
            margin-bottom: 5px;
        }

        .blog-card p {
            color: #8b949e;
            font-size: 13px;
        }

        @media (max-width: 800px) {
            .terminal { width: 95vw; height: 90vh; }
            .sidebar { width: 60px; }
            .nav-item span { display: none; }
        }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="terminal-header">
            <div class="controls">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <div class="terminal-title">sureshram@github.io — zsh</div>
            <div></div>
        </div>
        <div class="terminal-main">
            <div class="sidebar">
                <div class="nav-item active" onclick="loadPage('whoami')">
                    <i data-lucide="user" size="18"></i>
                    <span>whoami</span>
                </div>
                <div class="nav-item" onclick="loadPage('blogs')">
                    <i data-lucide="book-open" size="18"></i>
                    <span>blogs</span>
                </div>
                <div class="nav-item" onclick="loadPage('projects')">
                    <i data-lucide="cpu" size="18"></i>
                    <span>projects</span>
                </div>
                <div class="nav-item" onclick="loadPage('tools')">
                    <i data-lucide="wrench" size="18"></i>
                    <span>tools</span>
                </div>
            </div>
            <div class="content-area" id="content">
                <!-- Content will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        // Mock Data / Embedded Content
        const MOCK_DATA = {
            resume: `# Suresh Ramakrishnaiah
## Software Engineer

**Summary**
Experienced Software Engineer with a passion for high-performance systems, data visualization, and technology curation. Proficient in Python, Java, and modern web technologies.

**Experience**
- **Software Engineer**
  - Building scalable backend services.
  - Implementing data visualization solutions.
  - Curating high-quality engineering resources.

**Skills**
- **Languages:** Python, JavaScript, Java, SQL
- **Tech:** AWS (DynamoDB), React, Node.js
- **Interests:** Data Visualization, System Design, Engineering Blogs

**Education**
- Bachelor of Engineering in Computer Science`,

            projects: `# Collection of Top Projects

### Python
- [Minecraft in Python](https://github.com/fogleman/Minecraft) - A simple Minecraft clone written in Python and Pyglet.
- [CherryPy](https://bitbucket.org/cherrypy/cherrypy/src) - A minimalist Python web framework.
- [Python Data Structures](http://interactivepython.org/runestone/static/pythonds/index.html) - Documentation for classic algorithms in Python.

### Visualization & Charting
- [Echarts (Baidu)](https://github.com/ecomfe/echarts) - A powerful, interactive charting and data visualization library.
- [Bricks.js](http://callmecavs.com/bricks.js/) - A blazing fast masonry layout generator.
- [Netdata](https://github.com/firehol/netdata) - Real-time performance monitoring and visualization.
- [Vega](https://vega.github.io/vega/) - A visualization grammar for creating interactive designs.`,

            tools: `# Engineering Tools & Resources

### Development Tools
- [Dillinger](http://dillinger.io/) - Markdown editor and export to HTML.
- [CodeBeautify](http://codebeautify.org/htmlviewer/) - HTML beautifier and viewer.
- [AWS DynamoDB](https://gist.github.com/sureshram/2342926f0a054c75668076c594b33c30) - Curated tips and tricks.

### Technology News
- [Hacker News](https://news.ycombinator.com/) - Daily tech updates and discussions.

### Learning Resources
- [Bitcoin Course](https://www.coursera.org/course/bitcointech) - Understanding blockchain technology.
- [Streaming Algorithms](https://gist.github.com/debasishg/8172796) - Data structures and algorithms for streaming data.`,

            blogs: [
                { 
                    id: 'pyfileio',
                    name: 'Python File I/O', 
                    desc: 'A quick guide to file operations in Python.',
                    content: `# Python File I/O

### Python File I/O Features
- **open()**: The standard way to open files in Python.
- **io.open()**: Preferred for cross-version compatibility.
- **shutil**: High-level file operations (copying, moving).

\`\`\`python
with open('data.txt', 'r') as f:
    content = f.read()
    print(content)
\`\`\`
`
                },
                { 
                    id: 'regression',
                    name: 'Regression Analysis', 
                    desc: 'External: A deep dive into regression.',
                    external: true,
                    url: 'https://hbr.org/2015/11/a-refresher-on-regression-analysis'
                }
            ]
        };

        const contentDiv = document.getElementById('content');

        const pages = {
            whoami: () => {
                const html = marked.parse(MOCK_DATA.resume);
                // Insert social links right after the H1 title
                const socialLinks = `
                    <div style="display:flex; gap:20px; margin: -10px 0 20px 0;">
                        <a href="https://github.com/sureshram" target="_blank" style="display:flex; align-items:center; gap:5px; font-size:12px;"><i data-lucide="github" size="14"></i> GitHub</a>
                        <a href="https://linkedin.com/in/sramakrishnaiah" target="_blank" style="display:flex; align-items:center; gap:5px; font-size:12px;"><i data-lucide="linkedin" size="14"></i> LinkedIn</a>
                    </div>
                `;
                const finalHtml = html.replace('</h1>', '</h1>' + socialLinks);

                return `
                    <div class="cmd"><span class="prompt">➜</span> <span style="color:#d2a8ff">whoami</span></div>
                    <div class="markdown-body">
                        ${finalHtml}
                    </div>
                `;
            },
            blogs: () => {
                let listHtml = MOCK_DATA.blogs.map(b => `
                    <div class="blog-card" onclick="${b.external ? `window.open('${b.url}', '_blank')` : `viewBlogPost('${b.id}')`}">
                        <h3>${b.name} ${b.external ? '↗' : ''}</h3>
                        <p>${b.desc}</p>
                    </div>
                `).join('');

                return `
                    <div class="cmd"><span class="prompt">➜</span> <span style="color:#d2a8ff">ls ./blog</span></div>
                    <div class="blog-list">${listHtml}</div>
                `;
            },
            projects: () => {
                const html = marked.parse(MOCK_DATA.projects);
                return `
                    <div class="cmd"><span class="prompt">➜</span> <span style="color:#d2a8ff">cat projects.md</span></div>
                    <div class="markdown-body">${html}</div>
                `;
            },
            tools: () => {
                const html = marked.parse(MOCK_DATA.tools);
                return `
                    <div class="cmd"><span class="prompt">➜</span> <span style="color:#d2a8ff">grep "tools" ./resources.md</span></div>
                    <div class="markdown-body">${html}</div>
                `;
            }
        };

        function loadPage(pageId) {
            // Update active state
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('active');
                if (el.textContent.trim().includes(pageId)) el.classList.add('active');
            });

            const html = pages[pageId]();
            contentDiv.innerHTML = html;
            lucide.createIcons();
        }

        function viewBlogPost(blogId) {
            const blog = MOCK_DATA.blogs.find(b => b.id === blogId);
            const html = marked.parse(blog.content);
            contentDiv.innerHTML = `
                <div class="cmd"><span class="prompt">➜</span> <span style="color:#d2a8ff">cat blog/${blogId}.md</span></div>
                <div class="markdown-body">
                    <button onclick="loadPage('blogs')" style="background:var(--surface); color:var(--text); border:1px solid var(--border); padding:5px 10px; border-radius:4px; cursor:pointer; margin-bottom:20px;">← Back to Blogs</button>
                    ${html}
                </div>
            `;
            lucide.createIcons();
        }

        // Initial load
        loadPage('whoami');
        lucide.createIcons();
    </script>
</body>
</html>
